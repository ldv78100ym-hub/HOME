<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathématiques - Portail Éducatif</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* --- 1. VARIABLES & RESET --- */
        :root {
            --sidebar-width: 280px;
            --primary-color: #2563eb;
            --primary-dark: #1e40af;
            --accent-color: #10b981;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 12px;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- 2. LAYOUT PRINCIPAL --- */
        .sidebar {
            width: var(--sidebar-width);
            background: #111827;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-color);
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 4px;
            border-radius: 8px;
            color: #d1d5db;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .nav-item:hover { background-color: rgba(255,255,255,0.05); color: white; padding-left: 18px; }
        .nav-item.active { background-color: var(--primary-color); color: white; font-weight: 600; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .nav-item i { width: 25px; font-size: 1.1em; }

        .main-content { flex: 1; overflow-y: auto; padding: 30px 40px; position: relative; }
        header.top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1#page-title { font-size: 2rem; color: var(--text-main); margin: 0; position: relative; }
        h1#page-title::after { content: ''; display: block; width: 60px; height: 4px; background: var(--primary-color); margin-top: 8px; border-radius: 2px; }

        .welcome-screen { text-align: center; max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow-md); animation: fadeIn 0.6s ease; }
        .welcome-video-container { width: 100%; border-radius: var(--radius); overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .welcome-video-container video { width: 100%; display: block; }

        .subcategory-section { margin-bottom: 40px; animation: slideUp 0.4s ease forwards; opacity: 0; }
        .subcategory-title { font-size: 1.2rem; color: var(--primary-dark); margin-bottom: 15px; padding-left: 15px; border-left: 4px solid var(--accent-color); background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 100%); padding-top: 5px; padding-bottom: 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .resource-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 20px; text-decoration: none; color: var(--text-main); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; align-items: flex-start; position: relative; overflow: visible; }
        .resource-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-color: var(--primary-color); z-index: 10; }
        .resource-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--border-color); transition: background 0.3s; border-radius: var(--radius) 0 0 var(--radius); }
        .resource-card:hover::before { background: var(--primary-color); }

        .card-icon { font-size: 1.5rem; margin-right: 15px; color: var(--text-muted); transition: color 0.3s; }
        .resource-card:hover .card-icon { color: var(--primary-color); }
        .card-content { flex: 1; }
        .card-title { font-weight: 600; margin-bottom: 5px; display: block; }
        .card-meta { font-size: 0.85rem; color: var(--text-muted); }

        .card-tooltip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(10px); background: #1f2937; color: white; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 500; white-space: nowrap; opacity: 0; visibility: hidden; transition: all 0.2s ease; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 10px; }
        .card-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -5px; border-width: 5px; border-style: solid; border-color: #1f2937 transparent transparent transparent; }
        .resource-card:hover .card-tooltip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile */
        .mobile-toggle { display: none; position: fixed; bottom: 20px; right: 20px; background: var(--primary-color); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 200; font-size: 1.2rem; cursor: pointer; }

        /* Modale */
        .promo-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(5px); z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeIn 0.5s ease; }
        .promo-modal { background: white; border-radius: 16px; padding: 10px; width: 90%; max-width: 600px; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); animation: slideUp 0.5s ease; text-align: center; }
        .promo-close { position: absolute; top: -15px; right: -15px; background: #ef4444; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10001; }
        .promo-image { width: 100%; height: auto; border-radius: 12px; display: block; margin-bottom: 15px; cursor: pointer; border: 1px solid #eee; }
        .promo-btn { display: inline-block; background-color: #2563eb; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; transition: background 0.3s; width: 100%; }
        .promo-btn:hover { background-color: #1e40af; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-toggle { display: flex; align-items: center; justify-content: center; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="promoOverlay" class="promo-overlay">
        <div class="promo-modal">
            <button class="promo-close" onclick="closePromo()"><i class="fas fa-times"></i></button>
            <a href="https://www.safehelp.website" target="_blank">
                <img src="image_880347.png" alt="SafeHelp" class="promo-image">
            </a>
            <a href="https://www.safehelp.website" target="_blank" class="promo-btn">Découvrir SafeHelp</a>
        </div>
    </div>

    <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <nav class="sidebar" id="sidebar">
        <div class="brand"><i class="fas fa-cube"></i><span>Année 2025 -2026</span></div>
        <div id="nav-container"></div>
        <div style="margin-top: auto; padding-top: 20px; font-size: 0.8rem; color: #6b7280; text-align: center;">
            Yann Merdy © 2025-2026<br>Mise à jour : 22 mars 2026
        </div>
    </nav>

    <main class="main-content">
        <header class="top-header"><h1 id="page-title">Bienvenue</h1></header>
        <div id="content-area">
            <div id="welcome-view" class="welcome-screen">
                <div class="welcome-video-container">
                    <video autoplay loop muted playsinline><source src="MATHEMATIQUES.mp4" type="video/mp4"></video>
                </div>
                <h2>Espace Mathématiques</h2>
                <p>Sélectionnez une catégorie dans le menu de gauche.</p>
            </div>
            <div id="category-view" class="hidden"></div>
        </div>
    </main>

    <script>
        const linksData = [
            { "url": "https://ldv78100ym-hub.github.io/ALGEBRE_DIVERS/CALCULS.html", "title": "Calculs (Algèbre Divers)", "category": "Algèbre", "subcategory": "Calcul Littéral", "classes": "1ère STL / 1ère STI2D A / 1ère STLI2D" },
            { "url": "https://ldv78100ym-hub.github.io/ALGEBRE_DIVERS/EVOLUTIONS.html", "title": "Évolutions (Algèbre Divers)", "category": "Algèbre", "subcategory": "Outils", "classes": "1ère STL / 1ère STI2D A / 1ère STLI2D" },
            { "url": "https://ldv78100ym-hub.github.io/ALGEBRE_DIVERS/IDENTITES_REMARQUABLES.html", "title": "Identités Remarquables", "category": "Algèbre", "subcategory": "Calcul Littéral", "classes": "1ère STL / 1ère STI2D A / 1ère STLI2D" },
            { "url": "https://ldv78100ym-hub.github.io/TABLEAUX-DE-SIGNES/", "title": "Tableaux de Signes", "category": "Algèbre", "subcategory": "Outils", "classes": "1ère STL / 1ère STI2D A / 1ère STLI2D" },
            { "url": "https://ldv78100ym-hub.github.io/FACTORISATIONS/", "title": "Factorisations", "category": "Algèbre", "subcategory": "Calcul Littéral", "classes": "1ère STL / 1ère STI2D A / 1ère STLI2D" },
            { "url": "https://ldv78100ym-hub.github.io/SECOND_DEGRE/index1.html", "title": "Second Degré (Étude Algébrique)", "category": "Analyse", "subcategory": "Second Degré", "classes": "1ère STL / 1ère STLI2D" },
            { "url": "https://ldv78100ym-hub.github.io/SECOND_DEGRE/index2.html", "title": "QCM : Formes Quadratiques", "category": "Algèbre", "subcategory": "Second Degré", "classes": "1ère STL / 1ère STLI2D" },
            { "url": "https://ldv78100ym-hub.github.io/ARITHMETIQUE/SEANCE_1.html", "title": "Divisibilité - Cours", "category": "Maths Expertes", "subcategory": "Arithmétique", "classes": "Terminale Maths Exp" },
            { "url": "https://ldv78100ym-hub.github.io/ARITHMETIQUE/SEANCE_2.html", "title": "Division Euclidienne - Cours", "category": "Maths Expertes", "subcategory": "Arithmétique", "classes": "Terminale Maths Exp" },
            { "url": "https://ldv78100ym-hub.github.io/CRITERES_DIVISIBILITE.html", "title": "Critères de Divisibilité - Cours", "category": "Maths Expertes", "subcategory": "Arithmétique", "classes": "Terminale Maths Exp" },
            { "url": "https://ldv78100ym-hub.github.io/ARITHMETIQUE/SEANCE_3.html", "title": "PGCD - Cours", "category": "Maths Expertes", "subcategory": "Arithmétique", "classes": "Terminale Maths Exp" },
            { "url": "https://ldv78100ym-hub.github.io/ARITHMETIQUE/SEANCE_4.html", "title": "Bézout - Cours", "category": "Maths Expertes", "subcategory": "Arithmétique", "classes": "Terminale Maths Exp" },
            { "url": "https://ldv78100ym-hub.github.io/ARITHMETIQUE/SEANCE_5.html", "title": "Équation Diophantienne", "category": "Maths Expertes", "subcategory": "Arithmétique", "classes": "Terminale Maths Exp" },
            { "url": "https://ldv78100ym-hub.github.io/ARITHMETIQUE/SEANCE_6.html", "title": "Nombres Premiers", "category": "Maths Expertes", "subcategory": "Arithmétique", "classes": "Terminale Maths Exp" },
            { "url": "https://ldv78100ym-hub.github.io/GRAPHES/GRAPHES_COURS.html", "title": "Graphes - Cours", "category": "Maths Expertes", "subcategory": "Matrices & Graphes", "classes": "Terminale Maths Exp" },
            { "url": "https://ldv78100ym-hub.github.io/NOMBRE_DERIVE/", "title": "Nombre Dérivé - Cours", "category": "Analyse", "subcategory": "Nombre Dérivé", "classes": "1ère STL / 1ère STI2D" },
            { "url": "https://ldv78100ym-hub.github.io/SUITES_NUMERIQUES/DEFINITIONS_SUITES_NUMERIQUES.html", "title": "Suites - Applications", "category": "Analyse", "subcategory": "Suites Numériques", "classes": "1ère STL / 1ère STI2D A" },
            { "url": "https://ldv78100ym-hub.github.io/EPREUVES_TYPE_BAC/BAC_BLANC_TECHNO_01.html", "title": "Sujets types baccalauréat Juin 2026", "category": "Prépa Bac", "subcategory": "Sujets", "classes": "Tous" }
        ];

        const categoryConfig = [
            { name: "Algèbre", icon: "fas fa-square-root-alt" },
            { name: "Analyse", icon: "fas fa-chart-line" },
            { name: "Géométrie", icon: "fas fa-shapes" },
            { name: "Probabilités", icon: "fas fa-dice" },
            { name: "Maths Expertes", icon: "fas fa-atom" },
            { name: "CPGE", icon: "fas fa-university" },
            { name: "Flashcards", icon: "fas fa-bolt" },
            { name: "Jeux", icon: "fas fa-gamepad" },
            { name: "Prépa Bac", icon: "fas fa-file-signature" },
            { name: "Coefficients", icon: "fas fa-file-alt" }
        ];

        function initSidebar() {
            const container = document.getElementById('nav-container');
            const home = document.createElement('div');
            home.className = 'nav-item active';
            home.innerHTML = '<i class="fas fa-home"></i> Accueil';
            home.onclick = showWelcome;
            container.appendChild(home);

            categoryConfig.forEach(cat => {
                const btn = document.createElement('div');
                btn.className = 'nav-item';
                btn.innerHTML = `<i class="${cat.icon}"></i> ${cat.name}`;
                btn.onclick = (e) => loadCategory(cat.name, e.currentTarget);
                container.appendChild(btn);
            });
        }

        function showWelcome() {
            document.getElementById('welcome-view').classList.remove('hidden');
            document.getElementById('category-view').classList.add('hidden');
            document.getElementById('page-title').textContent = "Bienvenue";
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector('.nav-item').classList.add('active');
            closeSidebarMobile();
        }

        function loadCategory(name, btn) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.getElementById('welcome-view').classList.add('hidden');
            const view = document.getElementById('category-view');
            view.classList.remove('hidden');
            document.getElementById('page-title').textContent = name;

            const filtered = linksData.filter(l => l.category === name);
            const grouped = filtered.reduce((acc, l) => {
                const s = l.subcategory || "Général";
                if(!acc[s]) acc[s] = [];
                acc[s].push(l);
                return acc;
            }, {});

            view.innerHTML = Object.keys(grouped).length ? '' : '<p>Aucun contenu disponible.</p>';
            
            for(const [sub, items] of Object.entries(grouped)) {
                const sec = document.createElement('div');
                sec.className = 'subcategory-section';
                sec.innerHTML = `<div class="subcategory-title">${sub}</div>`;
                const grid = document.createElement('div');
                grid.className = 'cards-grid';
                items.forEach(item => {
                    const card = document.createElement('a');
                    card.href = item.url; card.target = "_blank"; card.className = 'resource-card';
                    card.innerHTML = `<div class="card-tooltip">Classe : ${item.classes}</div><i class="card-icon fas fa-book-open"></i><div class="card-content"><span class="card-title">${item.title}</span><span class="card-meta">Ouvrir</span></div>`;
                    grid.appendChild(card);
                });
                sec.appendChild(grid);
                view.appendChild(sec);
            }
            closeSidebarMobile();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebarMobile() { document.getElementById('sidebar').classList.remove('open'); }
        function closePromo() { document.getElementById('promoOverlay').style.display = 'none'; }

        window.addEventListener('DOMContentLoaded', initSidebar);
    </script>
</body>
</html>
